<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88.28 100" width="100%" height="100%">
  <!-- 
    "No Padding" logic:
    - Circle nodes have a radius of 10.
    - Underlying path is a circle centered on (50, 50) with radius 40.
    - The points and arc have been calculated relative to the outermost edges
      of the nodes at their maximum extent.
    - Furthest left (cyan node 4): edge is at x=0.
    - Furthest top (cyan node 2): edge is at y=0.
    - Furthest right (red node 7 edge): edge is at x=88.28.
    - Furthest bottom (cyan node 6 edge): edge is at y=100.
    - The viewBox '0 0 88.28 100' tightly captures all elements.
  -->

  <!-- Causal Path (Thick Line, Sweep 0 for a counter-clockwise flow arc) -->
  <path 
    d="M 78.28 21.72 A 40 40 0 1 0 78.28 78.28" 
    fill="none" 
    stroke="#27D3C3" 
    stroke-width="8" 
    stroke-linecap="round" 
  />

  <!-- Graph Nodes (Circles, radius 10) -->
  <!-- Top Right -->
  <circle cx="78.28" cy="21.72" r="10" fill="#27D3C3" />
  
  <!-- Top Center -->
  <circle cx="50" cy="10" r="10" fill="#27D3C3" />
  
  <!-- Top Left -->
  <circle cx="21.72" cy="21.72" r="10" fill="#27D3C3" />
  
  <!-- Center Left (Furthest Left point - edge is at x=0) -->
  <circle cx="10" cy="50" r="10" fill="#27D3C3" />
  
  <!-- Bottom Left -->
  <circle cx="21.72" cy="78.28" r="10" fill="#27D3C3" />
  
  <!-- Bottom Center -->
  <circle cx="50" cy="90" r="10" fill="#27D3C3" />
  
  <!-- Bottom Right (Commit Node - Furthest Right edge at x=88.28, Furthest Bottom edge at y=100) -->
  <circle cx="78.28" cy="78.28" r="10" fill="#FF646E" />
</svg>
