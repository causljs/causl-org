  <title>Spreadsheet Demo — Causl</title>
  <meta name="description" content="Causl spreadsheet demo — 100-cell diamond dependency graph with live formula editing, commit log, and whyUpdated introspection." />

  <link rel="stylesheet" href="../../css/topbar.css" />

  <style>
    /* Page-specific rules — spacing follows --space-N grid, headings
       inherit the unified site.css scale (#1265). */
    .hero {
      padding-top: var(--space-6);
      padding-bottom: var(--space-6);
    }
    .hero h1 { margin-top: var(--space-4); }
    .hero p.lede {
      font-size: 1.05rem;
      color: var(--text-on-base-muted);
      max-width: 720px;
      margin: var(--space-4) 0 var(--space-5);
    }
    :root[data-theme="light"] .hero p.lede { color: var(--text-on-base-muted); }

    #spreadsheet-root {
      max-width: var(--max-page);
      margin: 0 auto;
      padding: 0 var(--space-5) var(--space-7);
    }

    /* Status banner while the packages load from esm.sh */
    .load-status {
      font-size: 0.95rem;
      color: rgba(169, 181, 201, 0.7);
      padding: var(--space-4) 0;
    }
    .load-status.error { color: var(--conflict-coral); }

    /* Grid */
    .grid-wrap { overflow-x: auto; margin-bottom: var(--space-6); }

    table.sheet {
      border-collapse: collapse;
      font-variant-numeric: tabular-nums;
      font-size: 0.9rem;
      min-width: 360px;
    }
    table.sheet th,
    table.sheet td {
      border: 1px solid rgba(169, 181, 201, 0.18);
      padding: 4px 10px;
      min-width: 64px;
      text-align: right;
    }
    table.sheet th {
      background: rgba(26, 34, 56, 0.7);
      text-align: center;
      color: rgba(169, 181, 201, 0.7);
      font-weight: 600;
    }
    /* Light-mode pair for table header — AA-on-light text. */
    :root[data-theme="light"] table.sheet th {
      background: var(--surface-elevated);
      color: var(--text-on-elevated-muted);
    }
    table.sheet td.input-cell input[type="number"] {
      width: 56px;
      background: transparent;
      color: var(--text-on-base);
      border: none;
      text-align: right;
      font: inherit;
      font-variant-numeric: tabular-nums;
    }
    table.sheet td.changed {
      background: rgba(255, 247, 194, 0.18);
      transition: background 600ms ease;
    }
    /* Light-mode pair — soft amber tint visible on white. */
    :root[data-theme="light"] table.sheet td.changed {
      background: rgba(181, 117, 0, 0.16);
    }

    /* Section headings within the demo. The .demo-section h3 keeps
       its compact 1rem size + cyan colour — used as a small inline
       sub-label inside an in-page demo widget, not a full section
       heading; legitimate scoped override after the #1265 sweep. */
    .demo-section { margin-bottom: var(--space-6); }
    .demo-section h3 {
      font-size: 1rem;
      margin: 0 0 var(--space-3);
      color: var(--surface-emphasis);
    }

    /* Formula editor */
    .formula-editor {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 480px;
    }
    .formula-editor label {
      font-size: 0.82rem;
      color: rgba(169, 181, 201, 0.7);
    }
    .formula-editor select,
    .formula-editor textarea {
      background: var(--surface);
      color: var(--text-on-base);
      border: 1px solid rgba(169, 181, 201, 0.18);
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      font: 13px/1.4 var(--mono);
    }
    .formula-editor textarea { resize: vertical; }
    .formula-editor button {
      align-self: flex-start;
      padding: 5px 14px;
      background: var(--causal-cyan);
      color: var(--text-on-base);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-family: var(--sans);
      font-size: 0.9rem;
      transition: background 0.15s;
    }
    .formula-editor button:hover { background: var(--causal-cyan-2); }
    .formula-err {
      color: var(--conflict-coral);
      font: 12px/1.5 var(--mono);
      min-height: 1.5em;
    }

    /* Why + commit log */
    .why-box {
      font: 13px/1.5 var(--mono);
      color: rgba(169, 181, 201, 0.85);
      background: var(--surface);
      border: 1px solid rgba(169, 181, 201, 0.12);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      word-break: break-word;
    }
    .commit-log {
      font: 12px/1.5 var(--mono);
      background: var(--surface);
      border: 1px solid rgba(169, 181, 201, 0.12);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      max-height: 240px;
      overflow-y: auto;
      margin: 0;
      color: rgba(169, 181, 201, 0.85);
      white-space: pre;
    }
  </style>

  <!-- Importmap aliases the bare specifiers to the vendored ESM
       builds under /vendor/@causl/*. Falls back to esm.sh at runtime
       if any vendored import fails. -->
  <script type="importmap">
  {
    "imports": {
      "@causl/core": "../../vendor/@causl/core/index.js",
      "@causl/core/internal": "../../vendor/@causl/core/internal.js",
      "@causl/core/testing": "../../vendor/@causl/core/testing.js",
      "@causl/core/wasm": "../../vendor/@causl/core/wasm.js",
      "@causl/devtools": "../../vendor/@causl/devtools/index.js",
      "@causl/formula": "../../vendor/@causl/formula/index.js"
    }
  }
  </script>

  <!--
    Spreadsheet demo React app.

    Loads React 19 + ReactDOM 19 and the three causl packages: first
    via the importmap-resolved vendored copies, falling back to esm.sh
    on any resolution failure so the page exercises exactly what an
    adopter installs.
    The demo logic is the same fixture the Playwright dropped-frame
    test pins in CI (§16 Phase 3, 100-cell diamond).

    React 19 patterns:
      - No forwardRef; no class components.
      - useEffect used once, for booting the imperative causl graph
        after mount. The graph is fully imperative and cannot be
        constructed during render without introducing stale-closure
        issues across StrictMode double-invocations.
      - useState drives every display update; the imperative graph
        callbacks call the state setters so React owns the render.
  -->
  <script type="module">
    import React, {
      useState,
      useEffect,
      useRef,
      useCallback,
    } from 'https://esm.sh/react@19'
    import { createRoot } from 'https://esm.sh/react-dom@19/client'

    // Vendored bare specifiers (resolved by the importmap above) +
    // esm.sh fallback URLs used if the vendor copies fail to load.
    const CAUSL_CORE_SPEC    = '@causl/core'
    const CAUSL_FORMULA_SPEC = '@causl/formula'
    const CAUSL_DEVTOOLS_SPEC = '@causl/devtools'
    const CAUSL_CORE     = 'https://esm.sh/@causl/core'
    const CAUSL_FORMULA  = 'https://esm.sh/@causl/formula'
    const CAUSL_DEVTOOLS = 'https://esm.sh/@causl/devtools'

    async function loadCausl() {
      // Try vendored first; fall back to esm.sh on any failure.
      try {
        return await Promise.all([
          import(/* @vite-ignore */ CAUSL_CORE_SPEC),
          import(/* @vite-ignore */ CAUSL_FORMULA_SPEC),
          import(/* @vite-ignore */ CAUSL_DEVTOOLS_SPEC),
        ])
      } catch (_vendorErr) {
        return await Promise.all([
          import(/* @vite-ignore */ CAUSL_CORE),
          import(/* @vite-ignore */ CAUSL_FORMULA),
          import(/* @vite-ignore */ CAUSL_DEVTOOLS),
        ])
      }
    }

    // ── Cell value display helper ──────────────────────────────────
    function CellDisplay({ raw, valueOr }) {
      if (raw === undefined || raw === null) return React.createElement('span', null, '--')
      const v = valueOr(raw, NaN)
      if (Number.isFinite(v)) {
        return React.createElement('span', null, Number.isInteger(v) ? String(v) : v.toFixed(2))
      }
      if (raw && raw.kind === 'error') {
        return React.createElement('span', { title: raw.error?.message ?? 'error', style: { color: 'var(--conflict-coral)' } }, '#ERR')
      }
      return React.createElement('span', null, '--')
    }

    // ── Main app ───────────────────────────────────────────────────
    function SpreadsheetApp() {
      const [loadStatus, setLoadStatus] = useState('loading') // 'loading' | 'ready' | 'error'
      const [errorMessage, setErrorMessage] = useState('')

      // Cell display state: aInputValues (col A) + derivedValues (B/C/D/E1)
      const [aValues, setAValues] = useState(() => Array.from({ length: 10 }, (_, i) => i + 1))
      const [derivedValues, setDerivedValues] = useState({})
      const [logText, setLogText] = useState('(no commits yet)')
      const [whyText, setWhyText] = useState('(no commits yet)')
      const [formulaErr, setFormulaErr] = useState('')
      const [selectedCell, setSelectedCell] = useState('E1')
      const [formulaText, setFormulaText] = useState('=SUM(D1:D10)')

      // Imperative graph state held in refs — not rendered directly.
      const demoRef = useRef(null)

      // useEffect is required here: the causl graph is imperative and
      // depends on a mounted root (for useSyncExternalStore-style
      // subscription callbacks to reach setState). Building it during
      // render would either re-build it on every render or require
      // useMemo, which is not appropriate for side-effecting setup.
      useEffect(() => {
        let cancelled = false
        loadCausl().then(([coreMod, formulaMod, devtoolsMod]) => {
          if (cancelled) return
          bootDemo(coreMod, formulaMod, devtoolsMod)
          setLoadStatus('ready')
        }).catch((err) => {
          if (cancelled) return
          setLoadStatus('error')
          setErrorMessage(err instanceof Error ? err.message : String(err))
        })
        return () => { cancelled = true }
      // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [])

      function bootDemo(coreMod, formulaMod, devtoolsMod) {
        const { createCausl } = coreMod
        const {
          cellId, parseFormula, valueOr, cellRefToA1,
          a1ToCellRef, expandRange, FormulaParseError,
        } = formulaMod
        const { liveDerived, replaceMany, commitLog, whyUpdated, renderWhy } = devtoolsMod

        const graph = createCausl()
        const WORKBOOK = 'wb1'
        const SHEET = 'Sheet1'
        const knownNodes = new Map()
        const resolve = (ref) => knownNodes.get(`${ref.col},${ref.row}`)

        const aInputs = []
        for (let i = 0; i < 10; i++) {
          const node = graph.input(cellId(WORKBOOK, SHEET, { col: 0, row: i }), i + 1)
          aInputs.push(node)
          knownNodes.set(`0,${i}`, node)
        }

        class EvalErr extends Error {
          constructor(message) { super(message); this.name = 'EvalErr' }
        }

        function readNumber(value, ref) {
          if (typeof value === 'number') return value
          if (value === null || value === undefined) return 0
          if (typeof value === 'boolean') return value ? 1 : 0
          if (typeof value === 'string') {
            const t = value.trim()
            if (t === '') return 0
            const n = Number(t)
            if (Number.isFinite(n)) return n
            throw new EvalErr(`${cellRefToA1(ref)} non-numeric: "${value}"`)
          }
          if (typeof value === 'object' && value !== null && 'kind' in value) {
            if (value.kind === 'value' && typeof value.value === 'number') return value.value
            if (value.kind === 'error')
              throw new EvalErr(`${cellRefToA1(ref)} propagated: ${value.error?.message ?? 'error'}`)
          }
          throw new EvalErr(`${cellRefToA1(ref)} unsupported value`)
        }

        function evalAst(ast, get) {
          switch (ast.type) {
            case 'num': return ast.value
            case 'cell': {
              const node = resolve(ast.ref)
              if (!node) throw new EvalErr(`Unresolved cell ${cellRefToA1(ast.ref)}`)
              return readNumber(get(node), ast.ref)
            }
            case 'range': {
              let s = 0
              for (const ref of expandRange(ast.from, ast.to)) {
                const node = resolve(ref)
                if (!node) continue
                s += readNumber(get(node), ref)
              }
              return s
            }
            case 'binop': {
              const l = evalAst(ast.left, get)
              const r = evalAst(ast.right, get)
              switch (ast.op) {
                case '+': return l + r
                case '-': return l - r
                case '*': return l * r
                case '/':
                  if (r === 0) throw new EvalErr('Division by zero')
                  return l / r
                default: throw new EvalErr(`Unhandled binop ${ast.op}`)
              }
            }
            case 'unary': return -evalAst(ast.operand, get)
            case 'call': return evalCall(ast.name, ast.args, get)
            default: throw new EvalErr(`Unhandled AST node ${ast.type}`)
          }
        }

        function evalCall(name, args, get) {
          switch (name) {
            case 'SUM': {
              let s = 0
              for (const a of args) {
                if (a.type === 'range') {
                  for (const ref of expandRange(a.from, a.to)) {
                    const node = resolve(ref)
                    if (!node) continue
                    s += readNumber(get(node), ref)
                  }
                } else { s += evalAst(a, get) }
              }
              return s
            }
            case 'AVG':
            case 'AVERAGE': {
              let total = 0; let count = 0
              for (const a of args) {
                if (a.type === 'range') {
                  for (const ref of expandRange(a.from, a.to)) {
                    const node = resolve(ref)
                    if (!node) continue
                    total += readNumber(get(node), ref); count += 1
                  }
                } else { total += evalAst(a, get); count += 1 }
              }
              if (count === 0) throw new EvalErr(`${name}() needs at least one numeric argument`)
              return total / count
            }
            case 'MIN':
            case 'MAX': {
              const vals = []
              for (const a of args) {
                if (a.type === 'range') {
                  for (const ref of expandRange(a.from, a.to)) {
                    const node = resolve(ref)
                    if (!node) continue
                    vals.push(readNumber(get(node), ref))
                  }
                } else { vals.push(evalAst(a, get)) }
              }
              if (vals.length === 0) throw new EvalErr(`${name}() needs at least one numeric argument`)
              return vals.reduce((acc, v) => (name === 'MIN' ? Math.min(acc, v) : Math.max(acc, v)), vals[0])
            }
            default: throw new EvalErr(`Unknown function ${name}`)
          }
        }

        function computeFor(ast) {
          return (get) => {
            try { return { kind: 'value', value: evalAst(ast, get) } }
            catch (e) { return { kind: 'error', error: { kind: 'argument-error', message: e instanceof Error ? e.message : String(e) } } }
          }
        }

        const liveCells = new Map()

        function registerLive(name, ref, formula) {
          const id = cellId(WORKBOOK, SHEET, ref)
          const ast = parseFormula(formula)
          const handle = liveDerived(graph, id, computeFor(ast))
          knownNodes.set(`${ref.col},${ref.row}`, handle.node)
          liveCells.set(name, { handle, ref, formula, name })
        }

        for (let i = 0; i < 10; i++) registerLive(`B${i + 1}`, { col: 1, row: i }, `=A${i + 1}*2`)
        for (let i = 0; i < 10; i++) registerLive(`C${i + 1}`, { col: 2, row: i }, `=B${i + 1}+1`)
        for (let i = 0; i < 10; i++) registerLive(`D${i + 1}`, { col: 3, row: i }, `=C${i + 1}*B${i + 1}`)
        registerLive('E1', { col: 4, row: 0 }, '=SUM(D1:D10)')

        // Read initial derived values and push to React state.
        function readAllDerived() {
          const snapshot = {}
          for (const [name, cell] of liveCells) {
            snapshot[name] = graph.read(cell.handle.node)
          }
          return snapshot
        }
        setDerivedValues(readAllDerived())

        // Subscribe: on any commit, push fresh derived values + log to React state.
        const log = commitLog(graph, { capacity: 50 })

        // Render commitLog + whyUpdated panels immediately at mount.
        // subscribeCommits only fires on REAL commits, not at subscription
        // time, so without this immediate render the panels show the
        // placeholder text forever. The renderer is also reused inside
        // the subscribeCommits callback so commits keep refreshing both
        // panels, and inside handleCellSelect so the why-panel updates
        // when the user picks a different cell without committing.
        const renderLogAndWhy = () => {
          try {
            const entries = graph.read(log)
            if (entries.length === 0) {
              setLogText('(no commits yet)')
            } else {
              setLogText(
                entries.slice(0, 20).map(
                  (c, i) => `#${entries.length - i}  t=${c.time}  intent="${c.intent}"  changed=[${c.changedNodes.join(', ')}]`
                ).join('\n')
              )
            }
            const cellName = demoRef.current?.selectedCell ?? 'E1'
            const cell = liveCells.get(cellName)
            if (cell) {
              const w = graph.read(whyUpdated(graph, cell.handle.node))
              setWhyText(`${cellName}: ${renderWhy(w)}`)
            }
          } catch (err) {
            setLogText(`(devtools error: ${err.message})`)
            setWhyText(`(devtools error: ${err.message})`)
            console.error('[spreadsheet] devtools setup failed:', err)
          }
        }

        try {
          const firstCell = [...liveCells.values()][0]
          console.log('[spreadsheet] devtools wired:', {
            logNode: log,
            sampleWhy: firstCell
              ? whyUpdated(graph, firstCell.handle.node)
              : null,
          })
        } catch (err) {
          console.error('[spreadsheet] devtools wiring log failed:', err)
        }

        renderLogAndWhy() // immediate render at mount

        graph.subscribeCommits(() => {
          setDerivedValues(readAllDerived())
          try {
            const entries = graph.read(log)
            console.log('[spreadsheet] commit observed, entries:', entries.length)
          } catch (err) {
            console.error('[spreadsheet] commit observer read failed:', err)
          }
          renderLogAndWhy()
        })

        // Store imperative handles in a ref so event handlers can reach them.
        demoRef.current = {
          graph,
          liveCells,
          aInputs,
          replaceMany,
          parseFormula,
          FormulaParseError,
          computeFor,
          whyUpdated,
          renderWhy,
          log,
          selectedCell: 'E1',
          valueOr,
          renderLogAndWhy,
        }

        // Expose window.demo for console experimentation, matching the Vue version.
        window.demo = {
          graph, replaceMany, commitLog: log,
          whyUpdated: (cellName) => {
            const cell = liveCells.get(cellName)
            if (!cell) return null
            return graph.read(whyUpdated(graph, cell.handle.node))
          },
          cells: liveCells, inputs: aInputs,
          edit: (name, formula) => {
            const cell = liveCells.get(name)
            if (!cell) throw new Error(`Unknown cell ${name}`)
            const ast = parseFormula(formula)
            replaceMany(graph, [{ handle: cell.handle, next: computeFor(ast) }])
            cell.formula = formula
            return graph.read(cell.handle.node)
          },
          parseFormula, cellRefToA1, a1ToCellRef,
        }
      }

      // ── Handlers ────────────────────────────────────────────────

      const handleAInput = useCallback((row, value) => {
        const demo = demoRef.current
        if (!demo) return
        const next = Number(value)
        if (!Number.isFinite(next)) return
        demo.graph.commit(`A${row + 1}=${next}`, (tx) => tx.set(demo.aInputs[row], next))
        setAValues(prev => { const n = [...prev]; n[row] = next; return n })
      }, [])

      const handleApply = useCallback(() => {
        const demo = demoRef.current
        if (!demo) return
        setFormulaErr('')
        const cell = demo.liveCells.get(selectedCell)
        if (!cell) { setFormulaErr(`Unknown cell: ${selectedCell}`); return }
        let ast
        try { ast = demo.parseFormula(formulaText) }
        catch (e) {
          setFormulaErr(
            e instanceof demo.FormulaParseError ? `Parse error: ${e.message}` : String(e)
          )
          return
        }
        demo.replaceMany(demo.graph, [{ handle: cell.handle, next: demo.computeFor(ast) }])
        cell.formula = formulaText
      }, [selectedCell, formulaText])

      const handleCellSelect = useCallback((name) => {
        const demo = demoRef.current
        setSelectedCell(name)
        if (demo) {
          demo.selectedCell = name
          const cell = demo.liveCells.get(name)
          if (cell) setFormulaText(cell.formula)
          // Re-render both panels immediately on cell change, so the
          // "Why did this update?" panel reflects the newly selected cell
          // without waiting for a commit.
          demo.renderLogAndWhy?.()
        }
      }, [])

      const handleFormulaKeyDown = useCallback((e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
          e.preventDefault()
          handleApply()
        }
      }, [handleApply])

      // ── Render ───────────────────────────────────────────────────

      if (loadStatus === 'loading') {
        return React.createElement('p', { className: 'load-status' }, 'Loading the engine from esm.sh…')
      }
      if (loadStatus === 'error') {
        return React.createElement('p', { className: 'load-status error' }, errorMessage)
      }

      const demo = demoRef.current

      // Grid rows
      const gridRows = Array.from({ length: 10 }, (_, r) => {
        const bVal = derivedValues[`B${r + 1}`]
        const cVal = derivedValues[`C${r + 1}`]
        const dVal = derivedValues[`D${r + 1}`]
        return React.createElement('tr', { key: r },
          React.createElement('th', null, r + 1),
          // Column A: editable number inputs
          React.createElement('td', { className: 'input-cell' },
