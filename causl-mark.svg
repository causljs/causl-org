<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <!-- Obsidian Background (Remove for transparent favicon) -->
  <rect width="120" height="120" fill="#0B1020" rx="24" />

  <!-- Causal Path (Thick Line) -->
  <!-- Draws a circular arc from the top right node to the bottom right node -->
  <path 
    d="M 88.3 31.7 A 40 40 0 1 0 88.3 88.3" 
    fill="none" 
    stroke="#27D3C3" 
    stroke-width="8" 
    stroke-linecap="round" 
  />

  <!-- Graph Nodes (Thick Dots) -->
  <!-- Top Right -->
  <circle cx="88.3" cy="31.7" r="10" fill="#27D3C3" />
  
  <!-- Top Center -->
  <circle cx="60" cy="20" r="10" fill="#27D3C3" />
  
  <!-- Top Left -->
  <circle cx="31.7" cy="31.7" r="10" fill="#27D3C3" />
  
  <!-- Center Left -->
  <circle cx="20" cy="60" r="10" fill="#27D3C3" />
  
  <!-- Bottom Left -->
  <circle cx="31.7" cy="88.3" r="10" fill="#27D3C3" />
  
  <!-- Bottom Center -->
  <circle cx="60" cy="100" r="10" fill="#27D3C3" />
  
  <!-- Bottom Right (Commit Node - Conflict Coral / Red) -->
  <circle cx="88.3" cy="88.3" r="10" fill="#FF646E" />
</svg>
